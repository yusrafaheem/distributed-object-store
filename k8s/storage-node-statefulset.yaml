# StatefulSet, not Deployment, because storage nodes are the one genuinely
# stateful tier in this system: each replica owns its own on-disk chunk
# store and needs a stable identity (storage-node-0/1/2) so the ring's
# STORAGE_NODES topology and the headless Service's per-pod DNS names stay
# meaningful across restarts and rescheduling.
apiVersion: v1
kind: Service
metadata:
  name: storage-node
  namespace: objectstore
  labels:
    app: storage-node
spec:
  clusterIP: None # headless -- gives each pod a stable DNS name (storage-node-N.storage-node...)
  selector:
    app: storage-node
  ports:
    - name: http
      port: 4100
      targetPort: 4100
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: storage-node
  namespace: objectstore
spec:
  serviceName: storage-node
  replicas: 3
  selector:
    matchLabels:
      app: storage-node
  template:
    metadata:
      labels:
        app: storage-node
    spec:
      containers:
        - name: storage-node
          image: ghcr.io/yusrafaheem/distributed-object-store:latest
          command: ["node", "src/storageNode.js"]
          env:
            # Matches the StatefulSet's pod name (storage-node-0, -1, -2),
            # which is exactly the key format STORAGE_NODES in the
            # coordinator's ConfigMap expects.
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PORT
              value: "4100"
            - name: DATA_DIR
              value: "/data/chunks"
          ports:
            - containerPort: 4100
          volumeMounts:
            - name: chunk-data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /health, port: 4100 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4100 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
  volumeClaimTemplates:
    - metadata:
        name: chunk-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
