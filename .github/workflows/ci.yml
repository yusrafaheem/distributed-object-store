name: CI

on:
  push:
    branches: [main]
  pull_request:

  # Trigger a fresh synchronize so this PR's checks re-run against the latest main.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm test
